name: Build macOS Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            label: arm64
          - runner: macos-15-intel
            label: intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Build app
        env:
          RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        run: ./build_macos_app.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('MyTranscriber-{0}-macos-{1}', github.ref_name, matrix.label) || format('MyTranscriber-macos-{0}', matrix.label) }}
          path: ${{ startsWith(github.ref, 'refs/tags/v') && format('release/MyTranscriber-{0}-macos-{1}.zip', github.ref_name, matrix.label) || format('release/MyTranscriber-macos-{0}.zip', matrix.label) }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: release/MyTranscriber-${{ github.ref_name }}-macos-${{ matrix.label }}.zip
